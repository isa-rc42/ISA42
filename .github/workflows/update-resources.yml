name: Update Resources from Google Sheets

on:
  schedule:
    - cron: '0 12 * * *'
      timezone: 'America/Santiago'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-resources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyyaml requests

      - name: Run resources update script
        env:
          RESOURCES_CSV_URL: ${{ secrets.RESOURCES_CSV_URL || vars.RESOURCES_CSV_URL }}
        run: |
          python scripts/update_resources_from_sheets.py

      - name: Publish resources data to docs
        run: |
          mkdir -p docs/data
          cp data/resources.json docs/data/resources.json
          cp data/resources_diagnostics.json docs/data/resources_diagnostics.json
          cp data/community_resources.json docs/data/community_resources.json

      - name: Commit and push if changed
        id: commit-changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/resources.json data/resources_diagnostics.json data/community_resources.json
          git add -f docs/data/resources.json docs/data/resources_diagnostics.json docs/data/community_resources.json

          if git diff --cached --quiet; then
            echo "No changes detected in resources data."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update resources from Google Sheets"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger site render workflow
        if: steps.commit-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run publish-github-pages.yml --ref main
