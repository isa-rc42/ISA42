name: Update Members from Google Sheets

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update-members:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyyaml requests
          
      - name: Run update script
        env:
          MEMBERS_CSV_URL: ${{ secrets.MEMBERS_CSV_URL || vars.MEMBERS_CSV_URL }}
          PHOTOS_CSV_URL: ${{ secrets.PHOTOS_CSV_URL || vars.PHOTOS_CSV_URL }}
        run: |
          python scripts/update_members_from_sheets.py
          
      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update members directory from Google Sheets" && git push)
