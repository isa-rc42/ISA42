name: Update Members from Google Sheets

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  actions: write

jobs:
  update-members:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyyaml requests
          
      - name: Run update script
        env:
          MEMBERS_CSV_URL: ${{ secrets.MEMBERS_CSV_URL || vars.MEMBERS_CSV_URL }}
          PHOTOS_CSV_URL: ${{ secrets.PHOTOS_CSV_URL || vars.PHOTOS_CSV_URL }}
          PAST_MEMBERS_CSV_URL: ${{ secrets.PAST_MEMBERS_CSV_URL || vars.PAST_MEMBERS_CSV_URL }}
        run: |
          python scripts/update_members_from_sheets.py
          
      - name: Publish members data to docs
        run: |
          mkdir -p docs/data
          cp data/members.json docs/data/members.json
          cp data/members_diagnostics.json docs/data/members_diagnostics.json
          cp data/past_members.json docs/data/past_members.json
          
      - name: Commit and push if changed
        id: commit-changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add data/
          git add -f docs/data/members.json docs/data/members_diagnostics.json docs/data/past_members.json
          
          if git diff --cached --quiet; then
            echo "No changes detected in members data."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update members directory from Google Sheets"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
          
      - name: Trigger site render workflow
        if: steps.commit-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run publish-github-pages.yml --ref main

