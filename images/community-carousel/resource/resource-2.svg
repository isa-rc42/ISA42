<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="g_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17233A" />
      <stop offset="100%" stop-color="#1E3A5F" />
    </linearGradient>
    <linearGradient id="g_main" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2F5D7C" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#DDE5E8" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="g_soft" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DDE5E8" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#2F5D7C" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="1200" height="680" fill="url(#g_bg)" />
  
        <!-- Soft background digital library reticle -->
        <line x1="0" y1="220" x2="1200" y2="220" stroke="#DDE5E8" stroke-width="1" stroke-opacity="0.18" />
        <line x1="0" y1="460" x2="1200" y2="460" stroke="#DDE5E8" stroke-width="1" stroke-opacity="0.18" />
        <line x1="400" y1="0" x2="400" y2="680" stroke="#DDE5E8" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="10 10" />
        <line x1="800" y1="0" x2="800" y2="680" stroke="#DDE5E8" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="10 10" />
        
        <!-- Minimalist overlapping translucent glass cards -->
        <!-- Layer 1 (Background card) -->
        <rect x="180" y="100" width="460" height="320" rx="24" fill="#17233A" fill-opacity="0.6" stroke="#DDE5E8" stroke-width="1.5" stroke-opacity="0.3" />
        
        <!-- Layer 2 (Midground glass card) -->
        <rect x="280" y="160" width="520" height="360" rx="24" fill="url(#g_main)" stroke="#DDE5E8" stroke-width="2" stroke-opacity="0.5" />
        
        <!-- Layer 3 (Foreground clean card) -->
        <rect x="400" y="220" width="560" height="360" rx="24" fill="#1E3A5F" fill-opacity="0.85" stroke="#DDE5E8" stroke-width="2.5" stroke-opacity="0.7" />
        
        <!-- Clean editorial index markers on cards -->
        <rect x="440" y="260" width="100" height="16" rx="8" fill="#DDE5E8" />
        <rect x="440" y="300" width="320" height="12" rx="6" fill="#DDE5E8" fill-opacity="0.5" />
        <rect x="440" y="330" width="240" height="12" rx="6" fill="#DDE5E8" fill-opacity="0.3" />
        
        <circle cx="880" cy="268" r="16" fill="#F4F7F8" fill-opacity="0.85" />
        
</svg>