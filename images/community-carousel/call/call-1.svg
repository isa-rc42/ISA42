<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="g_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17233A" />
      <stop offset="100%" stop-color="#00796B" />
    </linearGradient>
    <linearGradient id="g_main" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#009688" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#CCFBF1" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="g_soft" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CCFBF1" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#009688" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="1200" height="680" fill="url(#g_bg)" />
  
        <!-- Luminous spotlight / open portal radiance -->
        <circle cx="600" cy="400" r="480" fill="url(#g_main)" opacity="0.35" />
        
        <!-- Smooth concentric expanding invitation waves -->
        <path d="M 250 400 C 250 200, 950 200, 950 400" fill="none" stroke="#CCFBF1" stroke-width="3" stroke-opacity="0.65" stroke-linecap="round" />
        <path d="M 150 440 C 150 140, 1050 140, 1050 440" fill="none" stroke="#CCFBF1" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="24 12" stroke-linecap="round" />
        <path d="M 50 480 C 50 80, 1150 80, 1150 480" fill="none" stroke="#009688" stroke-width="1.5" stroke-opacity="0.25" stroke-linecap="round" />
        
        <!-- Minimalist open doorway frame abstraction -->
        <rect x="460" y="160" width="280" height="420" rx="28" fill="#17233A" fill-opacity="0.8" stroke="#CCFBF1" stroke-width="3" stroke-opacity="0.8" />
        <rect x="500" y="200" width="200" height="380" rx="20" fill="url(#g_soft)" stroke="#F4F7F8" stroke-width="2" stroke-opacity="0.6" />
        
        <!-- Glowing focal spark of invitation -->
        <circle cx="600" cy="320" r="24" fill="#CCFBF1" />
        <circle cx="600" cy="320" r="10" fill="#F4F7F8" />
        <circle cx="600" cy="320" r="60" fill="none" stroke="#CCFBF1" stroke-width="1.5" stroke-opacity="0.5" />
        
</svg>