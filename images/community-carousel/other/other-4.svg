<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="g_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17233A" />
      <stop offset="100%" stop-color="#0F766E" />
    </linearGradient>
    <linearGradient id="g_main" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D6A24A" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#F2E6C9" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="g_soft" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F2E6C9" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#D6A24A" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="1200" height="680" fill="url(#g_bg)" />
  
        <!-- Subtle connecting network threads -->
        <line x1="250" y1="180" x2="600" y2="340" stroke="#F2E6C9" stroke-width="2" stroke-opacity="0.3" />
        <line x1="950" y1="200" x2="600" y2="340" stroke="#F2E6C9" stroke-width="2" stroke-opacity="0.3" />
        <line x1="400" y1="540" x2="600" y2="340" stroke="#F2E6C9" stroke-width="2" stroke-opacity="0.3" />
        <line x1="850" y1="520" x2="600" y2="340" stroke="#F2E6C9" stroke-width="2" stroke-opacity="0.3" />
        
        <!-- Calm geometric harmony (overlapping smooth circles & diamonds) -->
        <rect x="450" y="190" width="300" height="300" rx="60" transform="rotate(45 600 340)" fill="url(#g_main)" stroke="#F2E6C9" stroke-width="2.5" stroke-opacity="0.6" />
        <circle cx="600" cy="340" r="110" fill="#17233A" fill-opacity="0.8" stroke="#F2E6C9" stroke-width="2" stroke-opacity="0.7" />
        
        <circle cx="600" cy="340" r="32" fill="#F2E6C9" />
        <circle cx="600" cy="340" r="14" fill="#B7791F" />
        
        <!-- Surrounding serene satellites -->
        <circle cx="250" cy="180" r="24" fill="#D6A24A" fill-opacity="0.5" stroke="#F2E6C9" stroke-width="1.5" />
        <circle cx="950" cy="200" r="28" fill="#F2E6C9" fill-opacity="0.4" />
        <circle cx="400" cy="540" r="20" fill="#B7791F" fill-opacity="0.7" />
        <circle cx="850" cy="520" r="22" fill="#D6A24A" fill-opacity="0.6" />
        
</svg>