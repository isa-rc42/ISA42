<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="g_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <linearGradient id="g_main" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64748B" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#E5EAF0" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="g_soft" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E5EAF0" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#64748B" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="1200" height="680" fill="url(#g_bg)" />
  
        <!-- Subtle gathering background rings -->
        <circle cx="600" cy="340" r="320" fill="none" stroke="#E5EAF0" stroke-width="1.5" stroke-opacity="0.15" />
        <circle cx="600" cy="340" r="220" fill="none" stroke="#64748B" stroke-width="2" stroke-opacity="0.25" stroke-dasharray="24 12" />
        <circle cx="600" cy="340" r="130" fill="url(#g_soft)" />
        
        <!-- Delicate sweeping bezier gathering arcs -->
        <path d="M 150 150 C 300 280, 450 340, 600 340" fill="none" stroke="#E5EAF0" stroke-width="2.5" stroke-opacity="0.45" stroke-linecap="round" />
        <path d="M 1050 180 C 880 280, 720 340, 600 340" fill="none" stroke="#E5EAF0" stroke-width="2.5" stroke-opacity="0.45" stroke-linecap="round" />
        <path d="M 320 560 C 440 460, 520 380, 600 340" fill="none" stroke="#64748B" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round" />
        <path d="M 880 540 C 760 460, 680 380, 600 340" fill="none" stroke="#E5EAF0" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round" />
        
        <!-- Scholars / Dialogue meeting orbs in multi-depth planes -->
        <circle cx="600" cy="340" r="28" fill="#E5EAF0" />
        <circle cx="600" cy="340" r="12" fill="#64748B" />
        
        <circle cx="150" cy="150" r="22" fill="url(#g_main)" stroke="#E5EAF0" stroke-width="2" />
        <circle cx="1050" cy="180" r="26" fill="#64748B" fill-opacity="0.5" stroke="#E5EAF0" stroke-width="1.5" />
        <circle cx="320" cy="560" r="18" fill="#009688" fill-opacity="0.85" />
        <circle cx="880" cy="540" r="20" fill="#E5EAF0" fill-opacity="0.75" />
        
        <circle cx="440" cy="220" r="10" fill="#E5EAF0" fill-opacity="0.6" />
        <circle cx="760" cy="240" r="12" fill="#64748B" fill-opacity="0.8" />
        
</svg>